name: CD # Continuous Deployment

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Generate release notes
        run: git-cliff --current --strip header -o RELEASE_NOTES.md
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.job.os-name }}-${{ matrix.job.architecture }}
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        job:
          - os-name: linux
            target: x86_64-unknown-linux-gnu
            architecture: x86_64
          - os-name: linux
            target: aarch64-unknown-linux-gnu
            architecture: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.job.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build release binary
        run: cross build --locked --release --target ${{ matrix.job.target }}
      - name: Package release
        shell: bash
        run: |
          BINARY=target/${{ matrix.job.target }}/release/pond-netns
          RELEASE_NAME=netavark-plugin-pond-${GITHUB_REF/refs\/tags\//}-${{ matrix.job.os-name }}-${{ matrix.job.architecture }}
          mkdir assets
          tar czvf assets/$RELEASE_NAME.tar.gz $BINARY
          shasum -a 256 assets/$RELEASE_NAME.tar.gz > assets/$RELEASE_NAME.sha256
      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
